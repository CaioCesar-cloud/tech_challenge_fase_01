spring:
  datasource:
    url: jdbc:h2:mem:restaurante_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false              # H2 usa ddl-auto no perfil de teste

  h2:
    console:
      enabled: true
      path: /h2-console
